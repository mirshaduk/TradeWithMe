services:
  - type: web
    name: tradewithme-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FRONTEND_URL
        value: https://tradewithme.vercel.app  # Update this after Vercel deploy
